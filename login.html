<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTC - Portal Authentication System</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #2563eb;
            --accent-color: #f59e0b;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --border-color: #cbd5e1;
            --warning-color: #d97706;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Top Bar Actions inside login page */
        .top-actions {
            position: absolute;
            top: 20px; left: 5%; right: 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .lang-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

        /* Auth Card Container */
        .auth-container {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-brand h1 { font-size: 28px; color: var(--primary-color); font-weight: 800; }
        .auth-brand h1 span { color: var(--secondary-color); }
        .auth-brand p { color: #64748b; font-size: 14px; margin-top: 5px; }

        /* Tabs System */
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
        }
        .tab-link {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: 0.3s;
        }
        .tab-link.active {
            color: var(--secondary-color);
            border-bottom: 3px solid var(--secondary-color);
            margin-bottom: -2px;
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #475569; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        
        .form-control {
            width: 100%; padding: 12px 14px 12px 42px;
            border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 15px; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--secondary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8;
        }
        .password-toggle:hover { color: var(--secondary-color); }

        select.form-control { padding-left: 42px; appearance: none; }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; margin-bottom: 20px;
        }
        .forgot-password { color: var(--secondary-color); text-decoration: none; font-weight: 600; }
        .forgot-password:hover { text-decoration: underline; }

        .submit-btn {
            width: 100%; background: var(--primary-color); color: white;
            border: none; padding: 14px; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { background: var(--secondary-color); }

        /* Dynamic Registration Alert */
        .reg-success-box {
            background: #fffbeb; border: 1px solid #fef3c7; color: #92400e;
            padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; display: none;
        }

        .lang-rw { display: none; }
    </style>
</head>
<body>

    <!-- Navigation Header Controls -->
    <div class="top-actions">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> <span class="lang-en">Back to Website</span><span class="lang-rw">Soma Website</span></a>
        <button class="lang-btn" onclick="toggleLanguage()">Kinyarwanda</button>
    </div>

    <!-- Main Authentication Box -->
    <div class="auth-container">
        <div class="auth-brand">
            <h1>ASTC<span>.</span> Gateway</h1>
            <p class="lang-en">Access Strategy & Enterprise Portals Ecosystem</p>
            <p class="lang-rw">Injira mu mfuruka z'Inzego z'Ikigo n'Abanyeshuri</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="auth-tabs">
            <div class="tab-link active" onclick="switchTab('login')"><i class="fa-solid fa-right-to-bracket"></i> <span class="lang-en">Sign In</span><span class="lang-rw">Injira</span></div>
            <div class="tab-link" onclick="switchTab('register')"><i class="fa-solid fa-user-plus"></i> <span class="lang-en">Student Registration</span><span class="lang-rw">Kwiyandikisha</span></div>
        </div>

        <!-- Notification Box for New Registrations -->
        <div class="reg-success-box" id="regSuccessBox"></div>

        <!-- 1. UNIVERSAL LOGIN FORM (Students, Teachers, Admin) -->
        <form id="loginForm" class="auth-form active">
            <div class="form-group">
                <label class="lang-en">Reg Number / Institutional Email</label><label class="lang-rw">Kode y'Ishuri / Email y'Ikigo</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="loginUsername" class="form-control" required placeholder="ASTC-2026-XXXX or email">
                </div>
            </div>
            <div class="form-group">
                <label class="lang-en">Password</label><label class="lang-rw">Ijambo ry'Ibanga</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-control" required placeholder="••••••••">
                    <i class="fa-solid fa-eye password-toggle" onclick="togglePasswordVisibility('loginPassword', this)"></i>
                </div>
            </div>
            <div class="form-options">
                <div></div>
                <a href="#" class="forgot-password" onclick="triggerPasswordReset()">
                    <span class="lang-en">Forgot Password?</span><span class="lang-rw">Wanyagiwe Ijambo ry'Ibanga?</span>
                </a>
            </div>
            <button type="submit" class="submit-btn lang-en">Authenticate Identity</button>
            <button type="submit" class="submit-btn lang-rw">Emeza Umwirondoro</button>
        </form>

        <!-- 2. STUDENT REGISTRATION FORM (With Auto Reg Number Generation) -->
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label class="lang-en">Full Legal Name</label><label class="lang-rw">Amazina Yose</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="regName" class="form-control" required placeholder="John Doe">
                </div>
            </div>
            <div class="form-group">
                <label class="lang-en">Personal Email Address</label><label class="lang-rw">Email yawe</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="regEmail" class="form-control" required placeholder="johndoe@example.com">
                </div>
            </div>
            <div class="form-group">
                <label class="lang-en">Select Academic Faculty</label><label class="lang-rw">Hitamo Ishami (Faculty)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <select id="regFaculty" class="form-control" required>
                        <option value="" disabled selected class="lang-en">Choose Faculty...</option>
                        <option value="" disabled selected class="lang-rw">Hitamo ishami...</option>
                        <option value="Software Development">Software Development & Tech</option>
                        <option value="Advanced Welding">Advanced Industrial Welding</option>
                        <option value="Electricity & Energy Systems">Electricity & Energy Systems</option>
                        <option value="Culinary Arts & Hospitality">Culinary Arts & Hospitality</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="lang-en">Create Password</label><label class="lang-rw">Shyiraho Ijambo ry'Ibanga</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="regPassword" class="form-control" required placeholder="Minimum 6 characters">
                    <i class="fa-solid fa-eye password-toggle" onclick="togglePasswordVisibility('regPassword', this)"></i>
                </div>
            </div>
            <button type="submit" class="submit-btn lang-en" style="background: var(--secondary-color);">Create Student Account</button>
            <button type="submit" class="submit-btn lang-rw" style="background: var(--secondary-color);">Rema Konti y'Umunyeshuri</button>
        </form>
    </div>

    <!-- FIREBASE CORE CONFIGURATION AND AUTH INTEGRATION ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhQn1FZzjWTv39hvq3a1IrSigRocYAboI",
            authDomain: "astc-424a7.firebaseapp.com",
            projectId: "astc-424a7",
            storageBucket: "astc-424a7.firebasestorage.app",
            messagingSenderId: "1019297443056",
            appId: "1:1019297443056:web:8626d2276340f08a7a2635",
            measurementId: "G-CKM32596L1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // A. SYSTEM ACCOUNT REGISTERATION SYSTEM FOR STUDENTS (UPDATED WITH PENDING STATUS)
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const faculty = document.getElementById('regFaculty').value;
            const password = document.getElementById('regPassword').value;

            let isUnique = false;
            let regNumber = "";
            
            while (!isUnique) {
                const randomDigits = Math.floor(1000 + Math.random() * 9000);
                regNumber = `ASTC-2026-${randomDigits}`;
                
                const checkQuery = query(collection(db, "users"), where("username", "==", regNumber));
                const checkSnap = await getDocs(checkQuery);
                if (checkSnap.empty) {
                    isUnique = true;
                }
            }

            try {
                // Hano hashyizwemo "status": "pending" kugira ngo admin azabone uburyo bwo ku-approva
                await addDoc(collection(db, "users"), {
                    name: name,
                    email: email,
                    faculty: faculty,
                    password: password,
                    username: regNumber,
                    role: "student",
                    status: "pending", 
                    timestamp: serverTimestamp()
                });

                const successBox = document.getElementById('regSuccessBox');
                successBox.style.display = "block";
                
                if (window.currentLanguageState === "en") {
                    successBox.innerHTML = `
                        <strong>Registration Submitted Successfully!</strong><br>
                        Your Reg Number is: <strong style="color:var(--secondary-color); font-size:16px;">${regNumber}</strong><br>
                        <span style="color:var(--warning-color); font-weight:bold;"><i class="fa-solid fa-clock"></i> Status: Pending Admin Approval.</span><br>
                        <small>Please keep your Reg Number safe. You will be able to log in once the admin approves your account.</small>
                    `;
                } else {
                    successBox.innerHTML = `
                        <strong>Kwiyandikisha Kwasojwe neza!</strong><br>
                        Reg Number yawe ni: <strong style="color:var(--secondary-color); font-size:16px;">${regNumber}</strong><br>
                        <span style="color:var(--warning-color); font-weight:bold;"><i class="fa-solid fa-clock"></i> Imiterere: Itegereje kwemezwa na Admin.</span><br>
                        <small>Yikopie uyibuke. Uzashobora kwinjira muri system gusa igihe Admin amaze kwemeza konti yawe.</small>
                    `;
                }
                
                registerForm.reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
                console.error("Error creating student record: ", error);
            }
        });

        // B. UNIVERSAL LOG IN CONTROL (UPDATED WITH STATUS CHECK)
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userInput = document.getElementById('loginUsername').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;

            try {
                const userQuery = query(
                    collection(db, "users"), 
                    where("username", "==", userInput),
                    where("password", "==", passwordInput)
                );
                
                const emailQuery = query(
                    collection(db, "users"), 
                    where("email", "==", userInput),
                    where("password", "==", passwordInput)
                );

                let userSnapshot = await getDocs(userQuery);
                if(userSnapshot.empty) {
                    userSnapshot = await getDocs(emailQuery);
                }

                if (!userSnapshot.empty) {
                    let loggedUser = null;
                    userSnapshot.forEach(doc => { loggedUser = doc.data(); });

                    // Genzura niba ari umunyeshuri kandi niba yemerewe (Approved)
                    if (loggedUser.role === "student" && loggedUser.status === "pending") {
                        if (window.currentLanguageState === "en") {
                            alert("Your account is still pending admin approval. Please contact the administration.");
                        } else {
                            alert("Konti yawe ntiremezwa na Admin. Tegereza cyangwa uvugane n'ubuyobozi.");
                        }
                        return; // Guhagarika login process ntabe yakwinjira
                    }

                    alert(`Welcome back, ${loggedUser.name}! Directing to your portal...`);

                    if (loggedUser.role === "admin") {
                        window.location.href = "admin.html";
                    } else if (loggedUser.role === "teacher") {
                        window.location.href = "teacher.html";
                    } else {
                        window.location.href = "portal.html";
                    }
                } else {
                    alert("Invalid Username/Email or incorrect password! Please check again.");
                }
            } catch (error) {
                console.error("Authentication system failed: ", error);
            }
        });

        // C. FORGOT PASSWORD SIMULATION ENGINE
        window.triggerPasswordReset = async function() {
            const currentLang = window.currentLanguageState || "en";
            const promptMsg = currentLang === "en" ? 
                "Enter your Registered Username (Reg Number) or Institutional Email:" : 
                "Andika Kode yawe (Reg Number) cyangwa Email wakoresheje wiyandikisha:";
            
            const targetUser = prompt(promptMsg);
            if (!targetUser) return;

            const qUser = query(collection(db, "users"), where("username", "==", targetUser.trim()));
            const qEmail = query(collection(db, "users"), where("email", "==", targetUser.trim()));
            
            let snap = await getDocs(qUser);
            if(snap.empty) snap = await getDocs(qEmail);

            if(!snap.empty) {
                let userObj = null;
                snap.forEach(doc => { userObj = doc.data(); });
                
                const resetMsg = currentLang === "en" ? 
                    `Security Match Found!\nYour Password is: ${userObj.password}` : 
                    `Umwirondoro Uhuye neza!\nIjambo ry'Ibanga ryawe ni: ${userObj.password}`;
                alert(resetMsg);
            } else {
                const failMsg = currentLang === "en" ? 
                    "No account associated with that credential." : 
                    "Nta konti namba twasanze ifite iyo kode cyangwa email.";
                alert(failMsg);
            }
        }
    </script>

    <!-- UI ELEMENT INTERACTION LOGICS -->
    <script>
        function togglePasswordVisibility(id, icon) {
            const field = document.getElementById(id);
            if (field.type === "password") {
                field.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function switchTab(mode) {
            document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(el => el.classList.remove('active'));
            
            if(mode === 'login') {
                document.querySelectorAll('.tab-link')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-link')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        window.currentLanguageState = "en";
        function toggleLanguage() {
            const enElements = document.querySelectorAll('.lang-en');
            const rwElements = document.querySelectorAll('.lang-rw');
            const btn = document.querySelector('.lang-btn');

            if (window.currentLanguageState === "en") {
                enElements.forEach(el => el.style.display = 'none');
                rwElements.forEach(el => el.style.display = 'inline-block');
                btn.innerText = "English";
                window.currentLanguageState = "rw";
            } else {
                enElements.forEach(el => el.style.display = 'inline-block');
                rwElements.forEach(el => el.style.display = 'none');
                btn.innerText = "Kinyarwanda";
                window.currentLanguageState = "en";
            }
        }
    </script>
</body>
</html>

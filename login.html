<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTC - Authentication Gateway</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0f172a;
            --secondary-color: #2563eb;
            --accent-color: #f59e0b;
            --bg-light: #f1f5f9;
            --text-dark: #1e293b;
            --border-color: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-container { background: white; width: 100%; max-width: 480px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .brand { text-align: center; font-size: 28px; font-weight: 800; color: var(--primary-color); margin-bottom: 25px; }
        .brand span { color: var(--secondary-color); }

        /* Tabs Switcher */
        .auth-tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 16px; font-weight: 600; color: #64748b; cursor: pointer; text-align: center; }
        .tab-btn.active { color: var(--secondary-color); border-bottom: 2px solid var(--secondary-color); margin-bottom: -2px; }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 40px 12px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; outline: none; }
        .form-control:focus { border-color: var(--secondary-color); }
        
        /* Password Visibility Toggle */
        .pass-toggle { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #94a3b8; }
        .pass-toggle:hover { color: var(--secondary-color); }

        .submit-btn { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: var(--secondary-color); }

        .forgot-link { display: block; text-align: right; margin-top: 10px; font-size: 14px; color: var(--secondary-color); text-decoration: none; font-weight: 600; }
        .forgot-link:hover { text-decoration: underline; }

        /* Success Reg Number Banner */
        .reg-success-box { background: #ecfdf5; border: 1px solid #10b981; color: #065f46; padding: 15px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand">ASTC<span>.</span> Portals</div>
        
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Kinjira (Login)</button>
            <button class="tab-btn" onclick="switchTab('register')">Kwiyandikisha (Register)</button>
        </div>

        <!-- Box yerekana Reg Number iyo umunyeshuri amaze kwiyandikisha -->
        <div class="reg-success-box" id="regSuccessBox"></div>

        <!-- 1. LOGIN FORM (Abanyeshuri, Abarimu & Admin bose) -->
        <div id="loginPanel" class="form-panel active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Umutsindo / Username (Reg Number cyangwa Email)</label>
                    <input type="text" id="loginUsername" class="form-control" placeholder="ASTC/2026/SD/... cyangwa email@astc.ac.rw" required>
                </div>
                <div class="form-group">
                    <label>Ijambo ry'Ibanga (Password)</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye pass-toggle" onclick="togglePassword('loginPassword', this)"></i>
                </div>
                <button type="submit" class="submit-btn">Injira mu we Mwanya</button>
                <a href="#" class="forgot-link" onclick="handleForgotPassword()">Wibagiwe Password?</a>
            </form>
        </div>

        <!-- 2. REGISTRATION FORM (Abanyeshuri gusa) -->
        <div id="registerPanel" class="form-panel">
            <form id="registerForm">
                <div class="form-group">
                    <label>Amazina Yombi (Full Name)</label>
                    <input type="text" id="regName" class="form-control" placeholder="Karasira Jean" required>
                </div>
                <div class="form-group">
                    <label>Email Ifatika (Izafasha guhindura password)</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="jean@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Ishami ushaka kwiga (Faculté / Department)</label>
                    <select id="regFaculty" class="form-control" style="padding-right: 12px;" required>
                        <option value="">-- Hitamo Ishami --</option>
                        <option value="SD">Software Development (SD)</option>
                        <option value="NE">Network Engineering (NE)</option>
                        <option value="WD">Website Design & Cybersecurity (WD)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kora Ijambo ry'Ibanga (Password)</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Akura mu nshuro 6" minlength="6" required>
                    <i class="fa-solid fa-eye pass-toggle" onclick="togglePassword('regPassword', this)"></i>
                </div>
                <button type="submit" class="submit-btn" style="background: var(--secondary-color);">Yandikisha muri ASTC</button>
            </form>
        </div>
    </div>

    <!-- FIREBASE INTEGRATION ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAhQn1FZzjWTv39hvq3a1IrSigRocYAboI",
            authDomain: "astc-424a7.firebaseapp.com",
            projectId: "astc-424a7",
            storageBucket: "astc-424a7.firebasestorage.app",
            messagingSenderId: "1019297443056",
            appId: "1:1019297443056:web:8626d2276340f08a7a2635"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // ==========================================
        // 1. ACTION: KWIYANDIKISHA (STUDENT REGISTRATION)
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const faculty = document.getElementById('regFaculty').value;
            const password = document.getElementById('regPassword').value;

            // Kurema Reg Number idahura n'iyundi: ASTC + Umwaka + Ishami + Imibare 4 ya random
            const randomDigits = Math.floor(1000 + Math.random() * 9000); // 1000 kugeza 9999
            const regNumber = `ASTC/2026/${faculty}/${randomDigits}`;

            try {
                // Kurema user muri Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Kubika amakuru muri Firestore (Biri mu rwego rwa "student")
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: name,
                    email: email,
                    faculty: faculty,
                    regNumber: regNumber,
                    role: "student"
                });

                // Kwereka umunyeshuri Reg Number ye
                const successBox = document.getElementById('regSuccessBox');
                successBox.style.display = "block";
                successBox.innerHTML = `<strong>Kwiyandikisha byagenze neza!</strong><br>Reg Number yawe ni: <b style='color:#ef4444;'>${regNumber}</b><br>Yifashishe nka Username ujya kwinjira.`;
                
                document.getElementById('registerForm').reset();
                switchTab('login'); // Mureke ahite ajya kwinjira

            } catch (error) {
                alert("Ikibazo cyabaye: " + error.message);
            }
        });

        // ==========================================
        // 2. ACTION: KWINJIRA (LOGIN PROCESS FOR ALL ROLES)
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const inputUsername = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                let targetEmail = inputUsername;

                // Niba ari umunyeshuri wakoresheje Reg Number (ASTC/...), tugomba gushaka email yayo muri Firestore
                if (inputUsername.includes("ASTC/")) {
                    const q = query(collection(db, "users"), where("regNumber", "==", inputUsername));
                    const querySnapshot = await getDocs(q);
                    
                    if (querySnapshot.empty) {
                        alert("Iyi Reg Number ntabwo izwi muri sisitemu!");
                        return;
                    }
                    // Gukura email ihuza n'iyo Reg Number
                    querySnapshot.forEach((doc) => {
                        targetEmail = data = doc.data().email;
                    });
                }

                // Kwinjira hifashishijwe Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, targetEmail, password);
                const loggedUser = userCredential.user;

                // Kureba Role y'uyu winjiye muri Firestore ngo tumugabanye paji ihuye na we
                const userDoc = await getDoc(doc(db, "users", loggedUser.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    const role = userData.role;

                    // Redirection ishingiye kuri Role
                    if (role === "student") {
                        window.location.href = "portal.html";
                    } else if (role === "teacher") {
                        window.location.href = "teacher.html";
                    } else if (role === "admin") {
                        window.location.href = "admin.html";
                    } else {
                        alert("Nta nshingano (Role) uhawe, vugana na Admin.");
                    }
                } else {
                    alert("Amakuru yawe ntabwo ari muri Database ya Firestore.");
                }

            } catch (error) {
                alert("Kwinjira ntibyakunze: " + error.message);
            }
        });

        // ==========================================
        // 3. ACTION: GUHINDURA PASSWORD (FORGOT PASSWORD)
        // ==========================================
        window.handleForgotPassword = async () => {
            const email = prompt("Andika Email yawe wandikishije kugira ngo tukoherereze link yo guhindura password:");
            if (!email) return;

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Link yo guhindura password yoherejwe kuri email yawe! Yirebe mu minota mike.");
            } catch (error) {
                alert("Ikibazo cyabaye: " + error.message);
            }
        };

    </script>

    <!-- UI Interaction Scripts -->
    <script>
        // Guhinduranya ama-Tabs (Login / Register)
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.form-panel');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            panels.forEach(panel => panel.classList.remove('active'));

            if (type === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginPanel').add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        // Kureba/Guhisha Ijambo ry'Ibanga (Show/Hide Password)
        function togglePassword(inputId, iconEl) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconEl.classList.remove('fa-eye');
                iconEl.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                iconEl.classList.remove('fa-eye-slash');
                iconEl.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
